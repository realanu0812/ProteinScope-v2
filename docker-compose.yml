services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: proteinscope-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  grobid:
    image: lfoppiano/grobid:0.8.0
    container_name: proteinscope-grobid
    ports:
      - "8070:8070"

  api:
    build:
      context: ./apps/api
    container_name: proteinscope-api
    ports:
      - "8000:8000"
    env_file:
      - ./apps/api/.env
    environment:
      QDRANT_URL: http://qdrant:6333
      GROBID_URL: http://grobid:8070
    depends_on:
      - qdrant
      - grobid
    volumes:
      - ./apps/api/outputs:/app/outputs
      - ./apps/api/uploads:/app/uploads

  web:
    build:
      context: ./apps/web
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    container_name: proteinscope-web
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  qdrant_data:
