services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: proteinscope-api
    ports:
      - "8000:8000"
    env_file:
      - ./apps/api/.env
    volumes:
      - ./apps/api/uploads:/app/uploads
      - ./apps/api/outputs:/app/outputs
    depends_on:
      - qdrant
      - grobid
    environment:
      QDRANT_URL: http://qdrant:6333
      GROBID_URL: http://grobid:8070

  qdrant:
    image: qdrant/qdrant:latest
    container_name: proteinscope-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  grobid:
    image: grobid/grobid:0.9.0-crf
    container_name: proteinscope-grobid
    init: true
    ports:
      - "8070:8070"

volumes:
  qdrant_storage:
